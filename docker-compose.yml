services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: horic-autos-web:latest
    container_name: horic-autos-web
    ports:
      - "3755:3755"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3755
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3755/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
